<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Rhythm Game - No Flicker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-yellow: #fff200; --neon-blue: #00ffff; --neon-pink: #ff00ff; }
        body { background-color: #0a0a0c; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; gap: 10px; overflow: hidden; font-family: 'Inter', sans-serif; }
        #game-window { height: 90vh; aspect-ratio: 2 / 3; position: relative; border: 4px solid #fff; background: #000 no-repeat center / cover; }
        .awakened-ui { border-color: var(--neon-blue) !important; box-shadow: 0 0 35px var(--neon-blue), inset 0 0 20px var(--neon-pink); animation: hyper-pulse 0.8s infinite; }
        @keyframes hyper-pulse { 0% { box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-pink); } 50% { box-shadow: 0 0 45px var(--neon-blue), inset 0 0 35px var(--neon-pink); border-color: #fff !important; } 100% { box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-pink); } }
        #face-window { width: 22vh; height: 22vh; border: 4px solid var(--neon-yellow); background-color: #222; background-size: contain; background-position: center; background-repeat: no-repeat; align-self: flex-start; margin-top: calc(5vh + 4px); box-shadow: 0 0 15px rgba(255, 242, 0, 0.4); transform-origin: center; }
        .boing { animation: boing-effect 0.1s ease-out; }
        @keyframes boing-effect { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #countdown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: var(--neon-yellow); cursor: pointer; text-align: center; }
        #main-text { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px var(--neon-yellow); }
        #sub-text { font-size: 18px; color: #fff; margin-top: 15px; letter-spacing: 2px; }
        #combo-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; z-index: 20; display: none; }
        #combo-num { font-size: 85px; font-weight: 500; color: #ffffff; display: block; text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); }
        #combo-text { font-size: 18px; font-weight: 500; color: var(--neon-yellow); letter-spacing: 8px; margin-top: -10px; }
        #score-board { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: 900; color: white; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 4px; z-index: 11; }
        .lane { position: absolute; width: 15%; height: 100%; background: rgba(255,255,255,0.05); z-index: 1; }
        #lane-f { left: 34%; } #lane-j { left: 51%; }
        #judge-line { position: absolute; bottom: 22%; left: 34%; width: 32%; height: 4px; background: white; z-index: 5; box-shadow: 0 0 15px #fff; }
        .note { position: absolute; width: 15%; height: 2%; background: #fff; border-radius: 2px; z-index: 10; }
    </style>
</head>
<body>
    <div id="game-window">
        <div id="countdown-overlay" style="cursor: default;">
            <div id="main-text">LOADING...</div>
            <div id="sub-text">Please wait.</div>
        </div>
        <div id="combo-container"><span id="combo-num">0</span><div id="combo-text">COMBO</div></div>
        <div id="score-board">SCORE: 000000</div>
        <div id="lane-f" class="lane"></div><div id="lane-j" class="lane"></div><div id="judge-line"></div>
    </div>
    <div id="face-window"></div>

    <script>
        const gameWin = document.getElementById('game-window'), faceWin = document.getElementById('face-window'), scoreBoard = document.getElementById('score-board'), countdownEl = document.getElementById('countdown-overlay'), mainText = document.getElementById('main-text'), subText = document.getElementById('sub-text'), comboContainer = document.getElementById('combo-container'), comboNum = document.getElementById('combo-num');
        
        const imgs = { 
            g1: "https://uploads.onecompiler.io/44btje9x4/44hdnqzbb/1.png", 
            g2: "https://uploads.onecompiler.io/44btje9x4/44hdnqzbb/2.png", 
            g3: "https://uploads.onecompiler.io/44btje9x4/44hdnqzbb/3.png", 
            face1_def: "https://uploads.onecompiler.io/44btje9x4/44hezhrs7/4.png", 
            face2_press: "https://uploads.onecompiler.io/44btje9x4/44hezhrs7/5.png", 
            face3_hit: "https://uploads.onecompiler.io/44hezqbwa/44hj5vd3k/6.png",  
            face4_hitAwakened: "https://uploads.onecompiler.io/44hezqbwa/44hjyr7k2/4.png" 
        };

        // --- [컴공과 친구의 마법: 프리로딩 로직] ---
        let loadedCount = 0;
        const totalImgs = Object.keys(imgs).length;
        const cachedImgs = {};

        Object.entries(imgs).forEach(([key, src]) => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                loadedCount++;
                if (loadedCount === totalImgs) {
                    mainText.innerText = "TOUCH TO START";
                    subText.innerText = "READY?";
                    countdownEl.style.cursor = "pointer";
                    countdownEl.onclick = startCountdown;
                    // 초기 배경 미리 설정
                    gameWin.style.backgroundImage = `url('${imgs.g1}')`;
                    faceWin.style.backgroundImage = `url('${imgs.face1_def}')`;
                }
            };
        });
        // ------------------------------------------

        const voiceHitList = [new Audio('battle_break_11008_1.wav'), new Audio('battle_break_11003_1.wav'), new Audio('battle_s2_11007_1-01.wav')];
        const voicePressList = [new Audio('battle_break_11001_1.wav'), new Audio('battle_break_11007_1.wav'), new Audio('WOWOWO.wav')];
        let isVoicePlaying = false;

        function playRandomVoice(voiceList) {
            if (isVoicePlaying) return; 
            isVoicePlaying = true;
            const randomVoice = voiceList[Math.floor(Math.random() * voiceList.length)];
            setTimeout(() => {
                randomVoice.currentTime = 0;
                randomVoice.play().catch(()=>{ isVoicePlaying = false; });
                randomVoice.onended = () => { setTimeout(() => { isVoicePlaying = false; }, 200); };
            }, 120); 
        }
        function playHitEffect(file) { const effect = new Audio(file); effect.play().catch(()=>{}); }

        let score = 0, combo = 0, gameActive = false, isCounting = false, notes = [], faceTimer = null;
        let currentDefaultFace = imgs.face1_def;

        function setFace(hitFaceSrc, duration = 600) { 
            clearTimeout(faceTimer); 
            faceWin.style.backgroundImage = `url('${hitFaceSrc}')`; 
            faceTimer = setTimeout(() => { 
                const targetFace = (combo >= 15) ? imgs.face3_hit : imgs.face1_def;
                faceWin.style.backgroundImage = `url('${targetFace}')`; 
                faceTimer = null; 
            }, duration); 
        }

        function updateCombo(isReset) { 
            if (isReset) { 
                combo = 0; comboContainer.style.display = 'none'; 
                gameWin.classList.remove('awakened-ui');
                currentDefaultFace = imgs.face1_def; 
                if (!faceTimer) faceWin.style.backgroundImage = `url('${imgs.face1_def}')`;
            } else { 
                combo++; comboNum.innerText = combo; comboContainer.style.display = 'block'; 
                if (combo >= 15) {
                    gameWin.classList.add('awakened-ui');
                    currentDefaultFace = imgs.face3_hit; 
                    if (!faceTimer) faceWin.style.backgroundImage = `url('${imgs.face3_hit}')`;
                }
            } 
        }

        window.addEventListener('keydown', (e) => { 
            if (!gameActive || e.repeat) return; 
            const key = e.key.toLowerCase(); 
            if (key === 'f' || key === 'j') { 
                faceWin.classList.remove('boing'); void faceWin.offsetWidth; faceWin.classList.add('boing');
                gameWin.style.backgroundImage = `url('${key === 'f' ? imgs.g2 : imgs.g3}')`; 
                if (checkHit(key)) { 
                    if (combo >= 15) setFace(imgs.face4_hitAwakened, 1500); 
                    else setFace(imgs.face3_hit, 500); 
                    playRandomVoice(voiceHitList); playHitEffect('쎄게.mp3'); updateCombo(false); 
                } else { 
                    if (combo >= 15) setFace(imgs.face4_hitAwakened, 1500);
                    else setFace(imgs.face2_press, 400); 
                    playRandomVoice(voicePressList); playHitEffect('약하게.mp3');
                } 
            } 
        });

        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase(); 
            if (key === 'f' || key === 'j') {
                gameWin.style.backgroundImage = `url('${imgs.g1}')`;
            } 
        });

        function startCountdown() {
            if (isCounting || gameActive) return;
            isCounting = true;
            let count = 3;
            subText.innerText = "GET READY...";
            mainText.innerText = count;
            const timer = setInterval(() => {
                count--;
                if (count > 0) mainText.innerText = count;
                else {
                    clearInterval(timer);
                    mainText.innerText = "GO!";
                    setTimeout(() => {
                        countdownEl.style.display = 'none';
                        gameActive = true;
                        isCounting = false;
                        spawnNote();
                        requestAnimationFrame(update);
                    }, 500);
                }
            }, 1000);
        }

        function spawnNote() { 
            if (!gameActive) return;
            const lane = Math.random() > 0.5 ? 'f' : 'j'; 
            const el = document.createElement('div'); el.className = 'note'; el.style.left = (lane === 'f' ? 34 : 51) + '%'; el.style.top = '-5%'; 
            gameWin.appendChild(el); notes.push({ el, y: -5, lane, removed: false }); 
            spawnNote.timer = setTimeout(spawnNote, 850); 
        }

        function checkHit(lane) { 
            let isHit = false; 
            for (let n of notes) { 
                if (!n.removed && n.lane === lane && n.y > 70 && n.y < 86) { 
                    score += 100; scoreBoard.innerText = "SCORE: " + String(score).padStart(6, '0'); 
                    n.el.remove(); n.removed = true; isHit = true; break; 
                } 
            } return isHit; 
        }

        function update(time) { 
            if (!gameActive) return; 
            for (let i = notes.length - 1; i >= 0; i--) { 
                const n = notes[i]; 
                if (n.removed) { notes.splice(i, 1); continue; } 
                n.y += 1.4; n.el.style.top = n.y + '%'; 
                if (n.y > 100) { n.el.remove(); notes.splice(i, 1); updateCombo(true); } 
            } requestAnimationFrame(update); 
        }
    </script>
</body>
</html>
